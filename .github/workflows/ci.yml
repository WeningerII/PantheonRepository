name: CI

# Verify the artifact builds and the test suite passes on every push and PR.
on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test

      # Goal 2 — the committed corpus must reproduce byte-for-byte from the
      # committed data-sources/ via the generators + build (no hand-edited
      # blob). This rebuilds dist/pantheon-registry.html itself, so a
      # standalone build step would be redundant.
      - name: Verify byte-exact regeneration
        run: bash scripts/verify-regen.sh
