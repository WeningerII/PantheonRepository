name: CI

# Verify the artifact builds and the test suite passes on every push and PR.
on:
  push:
    branches:
      - main
      - claude/intelligent-volta-ZwLAt
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build single-file artifact
        run: python3 build.py

      - name: Run tests
        run: npm test

      # Goal 2 — the committed corpus must reproduce byte-for-byte from the
      # committed data-sources/ via the generators + build (no hand-edited blob).
      - name: Verify byte-exact regeneration
        run: bash scripts/verify-regen.sh
