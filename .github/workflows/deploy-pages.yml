name: Deploy to GitHub Pages

# Builds the single-file artifact with build.py and deploys it through GitHub's
# native Pages pipeline (actions/deploy-pages). This creates a real
# `github-pages` Deployment with a clickable URL on each run, and
# actions/configure-pages (enablement: true) turns Pages on automatically the
# first time — no manual Settings toggle required.
# NOTE: if the repo's `github-pages` environment has a Deployment-branches
# rule, it must permit `main` (Settings → Environments → github-pages →
# Deployment branches and tags) or the deploy job will be rejected.
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Least privilege: the build job needs only to read the repo. The deploy job
# (below) carries the Pages/OIDC grants — npm install and the third-party
# build steps never run with an OIDC-capable token.
permissions:
  contents: read

# Standard Pages concurrency group; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Never publish a build the suite hasn't passed.
      - name: Run tests
        run: npm test

      - name: Verify byte-exact regeneration
        run: bash scripts/verify-regen.sh

      - name: Build single-file artifact
        run: python3 build.py

      # Goal 3 — every release ships a dogfood sign-off. Ship the COMMITTED
      # checklist (the one a human actually reviewed), not a fresh unticked
      # regeneration; only the link base is rewritten for the site layout
      # (the artifact deploys as index.html, not dist/pantheon-registry.html).
      - name: Assemble Pages site
        run: |
          rm -rf _site && mkdir -p _site
          cp dist/pantheon-registry.html _site/index.html
          sed 's#dist/pantheon-registry\.html\##./index.html\##g' DOGFOOD.md > _site/DOGFOOD.md

      # Reads the repo's Pages config. Pages must be enabled once in Settings
      # (Source: GitHub Actions) — GitHub does not permit the Actions token to
      # enable Pages the first time. After that, this is fully automatic.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
