name: Deploy to GitHub Pages

# Builds the single-file artifact with build.py and deploys it through GitHub's
# native Pages pipeline (actions/deploy-pages). This creates a real
# `github-pages` Deployment with a clickable URL on each run, and
# actions/configure-pages (enablement: true) turns Pages on automatically the
# first time — no manual Settings toggle required.
# NOTE: deploys currently succeed only from claude/intelligent-volta-ZwLAt
# because the repo's `github-pages` environment has a Deployment-branches rule
# that does not (yet) permit `main`. main is kept here so it deploys
# automatically once that environment rule is set to allow main (Settings →
# Environments → github-pages → Deployment branches and tags).
on:
  push:
    branches:
      - main
      - claude/intelligent-volta-ZwLAt
  workflow_dispatch:

# Permissions the native Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Standard Pages concurrency group; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependency (@babel/standalone)
        run: npm install --no-audit --no-fund

      - name: Build single-file artifact
        run: python3 build.py

      - name: Assemble Pages site
        run: |
          rm -rf _site && mkdir -p _site
          cp dist/pantheon-registry.html _site/index.html

      # Reads the repo's Pages config. Pages must be enabled once in Settings
      # (Source: GitHub Actions) — GitHub does not permit the Actions token to
      # enable Pages the first time. After that, this is fully automatic.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
